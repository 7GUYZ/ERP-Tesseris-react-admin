server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 정적 파일(존재하면 바로 반환)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|json|map)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public";
  }

  # SPA 라우팅: 나머지는 모두 index.html로
  location / {
    try_files $uri /index.html;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}