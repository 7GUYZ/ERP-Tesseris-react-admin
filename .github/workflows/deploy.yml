name: Deploy to Kubernetes

on:
  push:
    branches:
      - sichan  # 또는 배포 브랜치명

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Set up Kubeconfig
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Replace image tag and apply deployment
        run: |
          sed "s#__DOCKER_IMAGE__#${{ secrets.DOCKER_IMAGE }}#g" k8s/deployment.yaml | \
          sed "s#__TAG__#${{ github.sha }}#g" > k8s/deployment.generated.yaml

          kubectl apply -f k8s/deployment.generated.yaml

      - name: Apply service
        run: |
          kubectl apply -f k8s/service.yaml
