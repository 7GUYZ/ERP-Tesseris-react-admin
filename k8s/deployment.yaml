apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-tesseris-react-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-tesseris-react-admin
  template:
    metadata:
      labels:
        app: erp-tesseris-react-admin
    spec:
      containers:
        - name: erp-tesseris-react-admin
          image: __DOCKER_IMAGE__:__TAG__
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: erp-tesseris-react-admin
spec:
  selector:
    app: erp-tesseris-react-admin
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
